<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jason | 全栈工程师</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --card: #12121a;
      --accent: #00d4aa;
      --accent-dim: #00d4aa33;
      --text: #e8e8ed;
      --text-dim: #8888a0;
      --border: #2a2a3a;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    .hero {
      text-align: center;
      margin-bottom: 60px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #7b61ff);
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      color: var(--bg);
      box-shadow: 0 0 60px var(--accent-dim);
    }

    .name {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .tagline {
      color: var(--text-dim);
      font-size: 18px;
      font-weight: 300;
    }

    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
    }

    .section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .about {
      font-size: 15px;
      color: var(--text-dim);
      line-height: 1.8;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .skill {
      background: var(--accent-dim);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
    }

    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .link:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      transform: translateY(-2px);
    }

    .link svg {
      width: 18px;
      height: 18px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .stat {
      text-align: center;
      padding: 16px;
      background: var(--bg);
      border-radius: 10px;
    }

    .stat-num {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    footer {
      text-align: center;
      padding: 40px 0;
      color: var(--text-dim);
      font-size: 13px;
    }

    @media (max-width: 540px) {
      .container { padding: 40px 16px; }
      .name { font-size: 26px; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="avatar">J</div>
      <h1 class="name">Jason</h1>
      <p class="tagline">全栈工程师 · 技术爱好者</p>
    </div>

    <div class="section">
      <div class="section-title">About</div>
      <p class="about">
        热爱技术，专注 Full Stack 开发。喜欢折腾各种有意思的工具和项目，
        探索 AI 与开发的结合。目前在学习 OpenClaw 多 Agent 协作体系。
      </p>
    </div>

    <div class="section">
      <div class="section-title">Tech Stack</div>
      <div class="skills">
        <span class="skill">JavaScript</span>
        <span class="skill">TypeScript</span>
        <span class="skill">Node.js</span>
        <span class="skill">Python</span>
        <span class="skill">React</span>
        <span class="skill">Vue</span>
        <span class="skill">Docker</span>
        <span class="skill">Git</span>
        <span class="skill">OpenClaw</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Stats</div>
      <div class="stats">
        <div class="stat">
          <div class="stat-num">--</div>
          <div class="stat-label">Repos</div>
        </div>
        <div class="stat">
          <div class="stat-num">--</div>
          <div class="stat-label">Followers</div>
        </div>
        <div class="stat">
          <div class="stat-num">--</div>
          <div class="stat-label">Stars</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Links</div>
      <div class="links">
        <a href="https://github.com" target="_blank" class="link">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub
        </a>
        <a href="mailto:3199264851@qq.com" class="link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Email
        </a>
      </div>
    </div>

    <footer>
      <p>© 2026 Jason. Built with ❤️</p>
    </footer>
  </div>
</body>
</html>
